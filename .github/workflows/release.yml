name: "Tauri Build & Release"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Targets for macOS universal build if selected
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Check if version is already released
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "Triggered by tag push. Skipping duplicate release check."
          else
            VERSION=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")
            TAG_NAME="app-v$VERSION"
            
            git fetch --tags origin
            
            if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              echo "::error::Version $VERSION (tag: $TAG_NAME) has already been released/tagged!"
              echo "::error::Please bump the version in package.json and src-tauri/tauri.conf.json before pushing."
              exit 1
            else
              echo "Version $VERSION (tag: $TAG_NAME) is unique and can be released."
            fi
          fi

      # Build the application
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # e.g. app-v0.1.0 (auto-replaced by tauri-action with package version)
          releaseName: "JewelOS v__VERSION__"
          releaseBody: "Automated build from Github Actions."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Optional: Upload installers as workflow artifacts so you can download them directly from the Actions run
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jewelos-${{ matrix.platform }}-installers
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
